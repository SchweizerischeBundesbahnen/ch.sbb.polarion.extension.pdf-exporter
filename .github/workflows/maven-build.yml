---
name: Build & Release
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, release-v*]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
env:
  SETTINGS_XML: ${{ github.workspace }}/.mvn/settings.xml
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin
  SONAR_SCANNER_OPTS: -Xmx1024m
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    services:
      weasyprint:
        image: ghcr.io/schweizerischebundesbahnen/weasyprint-service:latest@sha256:3b5113e120e5f079b17eeb24ed89072e0ae1f123c726ebb6c6590ec07eb3ad9f  # zizmor: ignore[unpinned-images]
        ports: [9080:9080]
    outputs:
      project_version: ${{ steps.project_metadata.outputs.version }}
      is_release: ${{ steps.project_metadata.outputs.is_release }}
    env:
      IO_JFROG_SBB_POLARION_TOKEN: ${{ secrets.IO_JFROG_SBB_POLARION_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      MARKDOWN2HTML_MAVEN_PLUGIN_FAIL_ON_ERROR: true
      GITHUB_TOKEN: ${{ github.token }}  # Providing this prevents reaching the GitHub request limits
      WEASYPRINT_SERVICE_URL: http://localhost:9080
    steps:
      - name: 📄 Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # Sonar needs full history
          persist-credentials: false
      - name: 🧱 Set up JDK and Maven
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: 📝 Extract project metadata
        id: project_metadata
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          # Check if it is a release
          if [[ ! "${VERSION}" =~ -SNAPSHOT$ ]]; then
            IS_RELEASE=true
          else
            IS_RELEASE=false
          fi
          {
            echo "version=${VERSION}"
            echo "is_release=${IS_RELEASE}"
          } >> "$GITHUB_OUTPUT"
      - name: 🔍 Cache SonarQube packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: 📦 Build with Maven for Pushes
        if: github.event_name == 'push'
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          IS_PUBLIC: ${{ github.event.repository.visibility == 'public' }}
          IS_TEMPLATE: ${{ github.event.repository.is_template }}
        run: |
          SONAR_ARGS=()
          if [ "${IS_PUBLIC}" = "true" ] && [ "${IS_TEMPLATE}" != "true" ]; then
            SONAR_ARGS+=(sonar:sonar "-Dsonar.exclusions=.github/**")
            if [ -n "${GITHUB_HEAD_REF}" ]; then
              SONAR_ARGS+=("-Dsonar.branch.name=${GITHUB_HEAD_REF}")
            fi
          fi
          mvn --batch-mode -s "${SETTINGS_XML}" clean verify -P tests-with-weasyprint-docker -Dweasyprint.service.url="${WEASYPRINT_SERVICE_URL}" "${SONAR_ARGS[@]}"
      - name: 📦 Build with Maven for PRs
        if: github.event_name == 'pull_request'
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_PR_NUMBER_REF: ${{ github.event.pull_request.number }}
        run: mvn --batch-mode -s "${SETTINGS_XML}" clean verify -P tests-with-weasyprint-docker -Dweasyprint.service.url="${WEASYPRINT_SERVICE_URL}" sonar:sonar -Dsonar.pullrequest.base="${GITHUB_BASE_REF}"
          -Dsonar.pullrequest.branch="${GITHUB_HEAD_REF}" -Dsonar.pullrequest.key="${GITHUB_PR_NUMBER_REF}"
      - name: 📋 Analyze dependencies
        run: mvn --batch-mode -s "${SETTINGS_XML}" dependency:analyze
        continue-on-error: false
      - name: 📦 Upload build artifacts
        # needed for uploads to GitHub Releases
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: maven-artifacts
          path: |
            target/*.jar
            target/*.pom
          retention-days: 1
          if-no-files-found: error
  # Deploy releases to Maven Central from main and LTS branches (release-v*)
  # See RELEASE.md for LTS branch documentation
  deploy-maven-central:
    needs: build
    if: ${{ needs.build.outputs.is_release == 'true' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-v')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_USERNAME: ${{ secrets.COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_USERNAME }}
      COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_TOKEN: ${{ secrets.COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_TOKEN }}
      COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_GPG_PASSPHRASE: ${{ secrets.COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_GPG_PASSPHRASE }}
      GITHUB_TOKEN: ${{ github.token }}  # Providing this prevents reaching the GitHub request limits
    steps:
      - name: 📄 Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: 🧱 Set up JDK and Maven with cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          gpg-private-key: ${{ secrets.COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_GPG_PRIVATE_KEY }}
      - name: 📦 Deploy to Maven Central
        # This cannot be implemented using deploy:deploy-file
        # The central-publishing-maven-plugin must be used instead due to specific deployment requirements
        # Additionally, timeouts are set to 1 hour to avoid issues with the connection to Sonatype Central during deployment
        run: |
          mvn --batch-mode -s "${SETTINGS_XML}" clean deploy \
            -Dmaven.test.skip=true \
            -P gpg-sign \
            -P central-publishing \
            -Dcentral.timeout=3600 \
            -Dmaven.wagon.http.connectionTimeout=3600000 \
            -Dmaven.wagon.http.readTimeout=3600000 \
            -Dcentral-publishing-maven-plugin.autoPublish=${{ github.event.repository.visibility == 'public' }}
  # Deploy to GitHub Packages (snapshots from main only) and upload release assets to GitHub Release
  # LTS branches (release-v*) only upload release assets, no snapshot deployment
  deploy-github-packages:
    needs: build
    if: ${{ github.ref == 'refs/heads/main' || (needs.build.outputs.is_release == 'true' && startsWith(github.ref, 'refs/heads/release-v')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REPO_NAME: ${{ github.repository }}
      PROJECT_VERSION: ${{ needs.build.outputs.project_version }}
    steps:
      - name: 📄 Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: 📥 Download build artifacts
        # The artifacts are generated in the 'build' step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: maven-artifacts
          path: target/
      - name: 🧱 Set up JDK and Maven
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: 🗑️ Delete existing SNAPSHOT version from GitHub Packages
        # May fail if the SNAPSHOT is the only version in the package,
        # as GitHub API does not allow deleting the last version.
        # Safe to ignore — no accumulation problem with a single version.
        if: ${{ needs.build.outputs.is_release == 'false' }}
        continue-on-error: true
        run: |
          GROUP_ID=$(mvn -s "${SETTINGS_XML}" help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn -s "${SETTINGS_XML}" help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          PACKAGE_NAME="${GROUP_ID}.${ARTIFACT_ID}"
          API_URL="/orgs/${GITHUB_REPOSITORY_OWNER}/packages/maven/${PACKAGE_NAME}/versions"
          VERSION_ID=$(gh api --paginate "${API_URL}" --jq ".[] | select(.name == \"${PROJECT_VERSION}\") | .id" || true)
          if [ -n "${VERSION_ID}" ]; then
            gh api --method DELETE "${API_URL}/${VERSION_ID}"
          fi
      - name: 📦 Deploy to GitHub Packages
        # Releases should only be deployed to GitHub Packages when the repo is private
        # Snapshots are always deployed to GitHub Packages
        if: ${{ needs.build.outputs.is_release == 'false' || github.event.repository.visibility == 'private' }}
        run: |
          mvn --batch-mode -s "${SETTINGS_XML}" deploy \
            -Dmaven.test.skip=true \
            -Dmaven.javadoc.skip=true \
            -Dmaven.source.skip=true \
            -P deploy-github-packages
      - name: 📦 Upload assets to GitHub Release
        if: ${{ needs.build.outputs.is_release == 'true' }}
        run: |-
          gh release upload "v${PROJECT_VERSION}" "target/*-${PROJECT_VERSION}.jar" --clobber
